# =============================================================================
# AIOVTUE Hugo 博客 — 主配置文件
# 修改后保存，本地运行 `npm run dev` 预览，确认无误后 `npm run build` 构建部署
# 详细说明见项目根目录 README.md
# =============================================================================

# 站点正式访问地址（影响 sitemap、RSS、分享链接等绝对 URL，部署前务必与真实域名一致）
baseURL = 'https://daily.yybb.us/'
locale = 'zh-cn'
defaultContentLanguage = 'zh'
title = 'AIOVTUE-雪'          # 站点名称（浏览器标题、页脚版权等）
theme = 'aiovtue'           # 主题目录：themes/aiovtue/
hasCJKLanguage = true      # 启用中文分词（搜索、摘要等）
enableRobotsTXT = true     # 生成 robots.txt（模板在 themes/aiovtue/layouts/robots.txt）

# --- 站点地图（sitemap.xml）---
[sitemap]
  changefreq = 'weekly'    # 更新频率提示
  priority = 0.5
  filename = 'sitemap.xml'

# --- 分页（首页文章列表）---
[pagination]
  pagerSize = 10           # 每页文章数

# --- 分类与标签 URL 路径 ---
[taxonomies]
  category = 'categories'  # /categories/xxx/
  tag = 'tags'             # /tags/xxx/

# --- 输出格式（首页与文章栏目额外生成 RSS）---
[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS']

# --- Markdown 渲染 ---
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true        # 允许正文内嵌 HTML
  [markup.highlight]
    style = "github"       # 代码高亮主题
    noClasses = false
    lineNos = false
    tabWidth = 4
  [markup.tableOfContents]
    startLevel = 2         # 侧边栏目录默认从 h2 开始
    endLevel = 4           # 目录至 h4，不显示 h5/h6
    ordered = false

# =============================================================================
# 站点参数（主题通过 .Site.Params 读取）
# =============================================================================
[params]
  subtitle = '雪'                              # 副标题（首页标题后缀）
  description = '雨是神的烟花'                  # 站点默认描述（SEO、分享卡片）
  primaryColor = '#DF9193'                     # 主题主色
  favicon = '/favicon.png'                       # 站点图标
  defaultCover = '/img/default-cover.png'        # 无封面文章默认图（1780908652756，与 hero-2 不是同一张）

  # --- 全站加载动画（首页进入时的加载页）---
  [params.loader]
    enable = true
    minShow = 480          # 最短显示时间（毫秒）
    maxDuration = 6000     # 最长等待时间（毫秒）

  # --- 侧边栏 / 关于页作者信息 ---
  [params.author]
    name = 'AIOVTUE'
    avatar = '/hero/avatar.png'
    statusEmoji = '🌸'     # 头像角标
    statusMessage = '发呆ing...'

  # --- 首页 Hero 大图 / 视频轮播 ---
  # 媒体文件放在 static/hero/，此处写 URL 路径（以 / 开头）
  [params.hero]
    title = 'AIOVTUE'
    motto = '雨是神的烟花'
    randomUrls = true      # 随机切换背景
    enableHitokoto = true  # 一言 API 随机格言
    typewriter = true      # 打字机效果
    typewriterSpeed = 80
    style = 'dot'          # 背景样式：dot / grid 等
    fixedImg = true
    playerUrl = '/hero/player.mp4'   # 右下角小窗视频
    urls = [
      '/hero/tt3.png', 
      '/hero/hero-1.jpg',
      '/hero/hero-2.png',
      '/hero/hero-3.jpg',
      '/hero/hero-1.mp4',
      '/hero/hero-2.mp4',
      '/hero/tt1.png', 
      '/hero/tt2.png', 
    ]

  # --- 页脚 ---
  [params.footer]
    since = 2024           # 版权起始年
    runtimeSince = '2024-01-01'   # 站点运行倒计时起点（YYYY-MM-DD）
    icp = '<a href="https://icp.gov.moe/?keyword=20260258" target="_blank" rel="noopener">萌ICP备20260258号</a>' # 萌icp，建议可以搞一个，虽然没啥用，不搞记得把我删了哦

  # --- 首页公告栏（右侧域名列表）---
  [params.notice]
    title = '公告栏'
    rotateInterval = 5000  # 左侧随机文章轮播间隔（毫秒）
    [[params.notice.sections]]
      label = '--- 站点域名 ---'
      lines = ['daily.yybb.us', 'day.yybb.us']
    [[params.notice.sections]]
      label = '--- 一些说明 ---'
      lines = ['不止是可以写域名哦，也可以写文字啦，修改位置在根文件夹的hugo.toml文件内']

  # --- 侧栏 / Hero 社交图标（icon 为 Iconify 图标名）---
  [[params.social]]
      name = 'RSS'
      link = '/index.xml'  # Hugo 默认 RSS 路径
      icon = 'ri:rss-line'
      color = 'orange'
    [[params.social]]
      name = 'GitHub'
      link = 'https://github.com/AIOVTUE'
      icon = 'ri:github-line'
      color = '#6e5494'
    [[params.social]]
      name = '微信公众号'
      link = '/hero/wxgzh.png'
      icon = 'ri:wechat-2-line'
      color = '#1AAD19'
    [[params.social]]
      name = 'E-Mail'
      link = 'mailto:x@yybb.us'
      icon = 'ri:mail-line'
      color = '#8E71C1'
    [[params.social]]
      name = 'Travelling'
      link = 'https://www.travellings.cn/go.html'
      icon = 'ri:train-line'
      color = '#8cb1b3'

  # --- 归档 / 标签页 ECharts 图表 ---
  [params.charts]
    archivesStartMonth = '2024-01'   # 归档图起始月份
    tagsChartLength = 10             # 标签图显示 Top N

  # --- 文章页底部赞助按钮 ---
  [params.sponsor]
    enable = true
    title = '我很可爱，请给我钱！'
    description = '我很可爱哦，可以给我点钱钱嘛~'
    [[params.sponsor.methods]]
      name = '支付宝'
      url = '/img/zfb.png'  #也可以用图床哒~
      color = '#00A3EE'
    [[params.sponsor.methods]]
      name = '微信支付'
      url = '/img/weix.png'
      color = '#2DC100'

  # --- 文章版权声明（CC 协议）---
  [params.license]
    enable = true
    type = 'by-nc-sa'      # CC 类型：by / by-nc / by-nc-sa / zero 等
    language = 'zh'

  # --- 文章页脚导航 ---
  [params.postFooter]
    navigationMerge = true # 合并上一篇/下一篇导航样式

  # --- 评论系统（文章 / 友链 / 留言页共用）---
  # provider 可选：waline | twikoo
  # 选waline的话可以去https://zerocat.dev/app/commentservice注册免费的，省的自己部署了
  # 单篇文章可在 front matter 写 comment: false 关闭评论区
  [params.comment]
    provider = 'twikoo'  # 可选：waline | twikoo

  # --- Waline 评论（https://waline.js.org/）---
  # serverURL：Waline 服务端地址，在 Waline 后台创建站点后获得（末尾不要加 /）
  [params.waline]
    serverURL = 'https://换成你的waline地址'  # 选了之后还要在这里配置相关地址哦
    placeholder = '分享你的想法...'

  # --- Twikoo 评论（仅当 params.comment.provider = twikoo 时生效）---
  # 留空 envId 时评论区显示配置提示，不影响站点其它功能
  [params.twikoo]
    envId = 'https://换成你的twikoo地址'  # 选了之后还要在这里配置相关地址哦

  # --- 留言页信封动画图片（文件在 static/envelope/）---
  [params.envelope]
    before = '/envelope/before.png'    # 留言页面没有特殊需求就不要改这里哦
    after = '/envelope/after.png'
    cover = '/envelope/cover.png'
    line = '/envelope/line.png'
    wrapHeight = 447
    openHeight = 1050
    openOffset = -200

  # --- 顶栏标题 ---
  [params.navbar]
    titleParts = ['AIOVTUE-', '雪']   # 顶栏主标题分段（可产生动画效果）
    subTitle = '雨是神的烟花'
    offset = 0

  # --- 全文搜索（Fuse.js）---
  [params.search]
    enable = true
    threshold = 0.35       # 匹配灵敏度（越小越严格）

  # --- 顶栏 / 侧栏导航菜单 ---
  # weight 越小越靠前；带 items 的项会展开子菜单
  [[params.menu.main]]
    name = '首页'
    url = '/'
    icon = 'ant-design:home-filled'
    weight = 1
  [[params.menu.main]]
    name = '文章'
    url = '/categories/'
    icon = 'ant-design:read-filled'
    navGroup = 'posts'
    weight = 2
    [[params.menu.main.items]]
      name = '分类'
      url = '/categories/'
      icon = 'ant-design:appstore-filled'
    [[params.menu.main.items]]
      name = '归档'
      url = '/archives/'
      icon = 'ant-design:container-filled'
    [[params.menu.main.items]]
      name = '标签'
      url = '/tags/'
      icon = 'ant-design:tags-filled'
  [[params.menu.main]]
    name = '相册'
    url = '/gallery/'
    icon = 'ant-design:picture-filled'
    weight = 3
  [[params.menu.main]]
    name = '留言'
    url = '/comment/'
    icon = 'ant-design:message-filled'
    weight = 4
  [[params.menu.main]]
    name = '友链'
    url = '/links/'
    icon = 'ant-design:global-outlined'
    weight = 5
  [[params.menu.main]]
    name = '关于'
    url = '/about/'
    icon = 'ant-design:idcard-filled'
    weight = 6
