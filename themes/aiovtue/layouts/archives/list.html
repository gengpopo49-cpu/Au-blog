{{ define "main" }}
<article class="sakura-page sakura-archives-page">
  {{- partial "page-header.html" . -}}
  <div class="sakura-page-content">
    <div id="archives-chart" class="sakura-stat-chart sakura-archives-chart"
         data-start="{{ .Site.Params.charts.archivesStartMonth | default `2024-01` }}"></div>
    <script type="application/json" id="archives-posts-data">{{ $posts := slice }}{{ range where .Site.RegularPages "Section" "posts" }}{{ $posts = $posts | append (dict "date" (.Date.Format "2006-01-02")) }}{{ end }}{{ $posts | jsonify | safeHTML }}</script>
    {{ $posts := where .Site.RegularPages "Section" "posts" }}
    <div class="sakura-timeline">
      {{ range ($posts.GroupByDate "2006") }}
      <section class="sakura-timeline__year" id="archive-year-{{ .Key }}">
        <h2>{{ .Key }}</h2>
        {{ range .Pages.ByDate.Reverse }}
        <div class="sakura-timeline__item">
          <time>{{ .Date.Format "01-02" }}</time>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </div>
        {{ end }}
      </section>
      {{ end }}
    </div>
  </div>
</article>
{{ end }}
