<header class="gallery-page-header sakura-page-header{{ with .Params.cover }} has-cover{{ end }}">
  {{- partial "page-header-cover.html" (dict "cover" .Params.cover "title" .Title "coverClass" "gallery-page-header__cover" "loading" "eager") -}}
  <div class="gallery-page-header__inner sakura-safe-padding">
    <h1 class="sakura-page-header__title">
      <span class="sakura-header-title">
        <span class="sakura-page-header__text sakura-title">{{ .Title }}</span>
      </span>
    </h1>
    {{ if and (not .IsSection) (ne .Params.source "webdav") }}
      {{ with .Params.photos }}
      <p class="gallery-page-header__count">相册共有 {{ len . }} 张照片</p>
      {{ end }}
    {{ end }}
  </div>
</header>
