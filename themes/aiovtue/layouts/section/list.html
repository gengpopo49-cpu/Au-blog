{{ define "main" }}
<article class="sakura-page">
  {{- partial "page-header.html" . -}}
  <div class="sakura-page-content">
    <div class="post-list-container">
      {{ range $index, $page := .Pages.ByDate.Reverse }}
        {{- partial "post-card.html" (dict "Page" $page "Site" $.Site "Index" $index) -}}
      {{ end }}
    </div>
  </div>
</article>
{{ end }}
